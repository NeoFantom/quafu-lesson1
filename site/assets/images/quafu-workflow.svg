<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Quafu task workflow</title>
  <desc id="desc">A six step workflow from writing a circuit to reading counts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edf5ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f62fe" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0f62fe"/>
    </marker>
  </defs>
  <rect width="980" height="420" rx="26" fill="url(#bg)"/>
  <g fill="none" stroke="#0f62fe" stroke-width="3" marker-end="url(#arrow)">
    <path d="M170 130 H300"/>
    <path d="M460 130 H590"/>
    <path d="M750 130 C840 130 850 288 750 292"/>
    <path d="M590 292 H460"/>
    <path d="M300 292 H170"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <g filter="url(#shadow)">
      <rect x="38" y="72" width="150" height="116" fill="#fff" stroke="#c6c6c6"/>
      <text x="58" y="108" font-size="13" fill="#6f6f6f">01 WRITE</text>
      <text x="58" y="140" font-size="22" font-weight="700" fill="#161616">Circuit</text>
      <text x="58" y="166" font-size="14" fill="#525252">OpenQASM 2.0</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="315" y="72" width="170" height="116" fill="#fff" stroke="#c6c6c6"/>
      <text x="338" y="108" font-size="13" fill="#6f6f6f">02 CHECK</text>
      <text x="338" y="140" font-size="22" font-weight="700" fill="#161616">Backend</text>
      <text x="338" y="166" font-size="14" fill="#525252">queue / status</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="605" y="72" width="170" height="116" fill="#fff" stroke="#c6c6c6"/>
      <text x="628" y="108" font-size="13" fill="#6f6f6f">03 SUBMIT</text>
      <text x="628" y="140" font-size="22" font-weight="700" fill="#161616">Task</text>
      <text x="628" y="166" font-size="14" fill="#525252">tmgr.run(...)</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="605" y="235" width="170" height="116" fill="#fff" stroke="#c6c6c6"/>
      <text x="628" y="271" font-size="13" fill="#6f6f6f">04 KEEP</text>
      <text x="628" y="303" font-size="22" font-weight="700" fill="#161616">Task id</text>
      <text x="628" y="329" font-size="14" fill="#525252">asynchronous</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="315" y="235" width="170" height="116" fill="#fff" stroke="#c6c6c6"/>
      <text x="338" y="271" font-size="13" fill="#6f6f6f">05 READ</text>
      <text x="338" y="303" font-size="22" font-weight="700" fill="#161616">Result</text>
      <text x="338" y="329" font-size="14" fill="#525252">tmgr.result(tid)</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="38" y="235" width="150" height="116" fill="#fff" stroke="#c6c6c6"/>
      <text x="58" y="271" font-size="13" fill="#6f6f6f">06 EXPLAIN</text>
      <text x="58" y="303" font-size="22" font-weight="700" fill="#161616">Counts</text>
      <text x="58" y="329" font-size="14" fill="#525252">plot / discuss</text>
    </g>
  </g>
  <g transform="translate(825 116)">
    <circle cx="56" cy="56" r="54" fill="#0f62fe" opacity=".08"/>
    <circle cx="56" cy="56" r="34" fill="#0f62fe" opacity=".14"/>
    <path d="M32 56h48M56 32v48M40 40l32 32M72 40L40 72" stroke="#0f62fe" stroke-width="4" stroke-linecap="round"/>
    <text x="56" y="134" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#525252">cloud QPU</text>
  </g>
</svg>
